services:
  mlflow:
    build: .
    env_file: .env
    ports:
      - 8080:8080
    networks:
      - mlflow
    environment:
      GUNICORN_CMD_ARGS: "--worker-class gevent --timeout 120"
      MLFLOW_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1,localhost:8080,127.0.0.1:8080,mlflow,mlflow:8080"
    command: >
      sh -c "
        until psql ${MLFLOW_SERVER_FILE_STORE} -c 'SELECT 1' > /dev/null 2>&1; do echo 'Waiting for DB...'; sleep 2; done; \
        mlflow server --workers=2 --host 0.0.0.0 --port 8080 \
          --backend-store-uri=${MLFLOW_SERVER_FILE_STORE} \
          --serve-artifacts
      "
  
  db-mlflow:
    image: postgres:17
    env_file: .env
    ports:
    - 5432:5432
    networks:
    - mlflow

networks:
  mlflow:
    name: mlflow

