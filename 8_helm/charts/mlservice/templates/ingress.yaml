apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlservice-ingress
  labels:
    app: mlservice
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: mlservice.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mlservice-service
            port:
              number: 8000
