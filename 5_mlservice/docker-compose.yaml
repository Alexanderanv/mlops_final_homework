services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    networks:
      - mlservice
      - mlflow
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "mlapp.migrate"]

  mlservice:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    networks:
      - mlservice
      - mlflow
    ports:
      - "${SERVICE_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  db:
    image: postgres:17
    env_file: .env
    networks:
      - mlservice
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

networks:
  mlservice:
    name: mlservice
  mlflow:
    external: true

volumes:
  pgdata:
